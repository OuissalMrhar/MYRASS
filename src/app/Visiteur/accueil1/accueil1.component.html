<app-navbar></app-navbar>

<ng-container *ngIf="homeLabels$ | async as t">
  <section class="hero home-reveal">
    <img
      class="hero__bg"
      src="https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto:eco,c_fill,g_auto,w_960/v1777552979/lghosn_up83h4.png"
      srcset="
        https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto:eco,c_fill,g_auto,w_480/v1777552979/lghosn_up83h4.png 480w,
        https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto:eco,c_fill,g_auto,w_768/v1777552979/lghosn_up83h4.png 768w,
        https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto:eco,c_fill,g_auto,w_1200/v1777552979/lghosn_up83h4.png 1200w,
        https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto:eco,c_fill,g_auto,w_1920/v1777552979/lghosn_up83h4.png 1920w
      "
      sizes="100vw"
      alt=""
      aria-hidden="true"
      fetchpriority="high"
      loading="eager"
      decoding="async"
      width="1920"
      height="1080"
    />
    <div class="hero-content">
      <h1>{{ t.heroTitle }}</h1>
      <p>{{ t.heroSubtitle }}</p>
    </div>
  </section>

  <section class="brand-story home-reveal home-reveal--delay-2">
    <h2>{{ t.storyTitle }}</h2>
    <div class="story-content" [class.story-content--expanded]="brandStoryExpanded">
      <p class="story-content__text">{{ t.storyBody }}</p>
      <button type="button" class="story-content__toggle" (click)="toggleBrandStory()">
        <ng-container *ngIf="brandStoryExpanded">{{ t.readLess }}</ng-container>
        <ng-container *ngIf="!brandStoryExpanded">{{ t.readMore }}</ng-container>
      </button>
    </div>
  </section>

  <section class="video-preview">
    <div class="video-preview__frame">
      <video
        class="video-preview__player"
        controls
        playsinline
        preload="metadata"
        poster="https://res.cloudinary.com/dzajgsdwg/video/upload/so_0,f_auto,q_auto:eco,w_960/v1777480791/79AACBAE-8FDF-4FDA-8BE2-F00004C6FADD_1_fpk1ym.jpg"
        aria-label="Vidéo Myrass"
      >
        <source src="https://res.cloudinary.com/dzajgsdwg/video/upload/q_auto:best,vc_auto,w_1280,c_limit/v1777480791/79AACBAE-8FDF-4FDA-8BE2-F00004C6FADD_1_fpk1ym.mp4" type="video/mp4" />
        <track
          kind="captions"
          src="/assets/captions/myrass-video.fr.vtt"
          srclang="fr"
          label="Français"
        />
      </video>
      <div class="video-preview__overlay"></div>
    </div>
  </section>

  <section class="collections">
    <div class="collections-desc">
      <p class="collections-desc__text" *ngIf="activeCategoryDescription">{{ activeCategoryDescription }}</p>
      <p class="collections-desc__text collections-desc__text--placeholder" *ngIf="!activeCategoryDescription">&nbsp;</p>
    </div>

    <div class="col-grid">
      <div
        class="col-item"
        *ngFor="let category of visibleCollectionCategories; let i = index"
        [class.col-item--active]="activeCategoryIndex === i"
        [class.col-item--inactive]="category.statut === false && !category.isComingSoon"
        (click)="selectCategory(i)"
      >
        <div class="col-img" [ngClass]="categoryBgClass(category, i)" [class.coming-soon]="category.isComingSoon">
          <span class="coming-badge" *ngIf="category.isComingSoon">{{ t.availableSoon }}</span>
          <span class="inactive-badge" *ngIf="category.statut === false && !category.isComingSoon">{{ t.availableSoon }}</span>
        </div>
        <p class="category-name">{{ category | lang: 'nom' : currentLang }}</p>
      </div>
    </div>

    <nav
      class="collections-pagination"
      *ngIf="isMobileCollectionsPaginated && collectionsTotalPages > 1"
      aria-label="Pagination des catégories"
    >
      <button
        type="button"
        class="collections-pagination__arrow"
        (click)="prevCollectionsPage()"
        [disabled]="collectionsPageIndex === 0"
        aria-label="Page précédente"
      >
        ‹
      </button>
      <div class="collections-pagination__dots" role="tablist">
        <button
          type="button"
          *ngFor="let p of collectionsPageIndices"
          class="collections-pagination__dot"
          [class.collections-pagination__dot--active]="p === collectionsPageIndex"
          (click)="goCollectionsPage(p)"
          [attr.aria-label]="'Page ' + (p + 1)"
          [attr.aria-current]="p === collectionsPageIndex ? 'true' : null"
        ></button>
      </div>
      <button
        type="button"
        class="collections-pagination__arrow"
        (click)="nextCollectionsPage()"
        [disabled]="collectionsPageIndex >= collectionsTotalPages - 1"
        aria-label="Page suivante"
      >
        ›
      </button>
    </nav>
  </section>

  <section class="ramadan-section home-reveal home-reveal--delay-2">
    <div class="ramadan-header">
      <ng-container *ngIf="gifts.length > 0">
        <h3>{{ gifts[0] | lang: 'nom' : currentLang }}</h3>
        <p *ngIf="(gifts[0] | lang: 'description' : currentLang) as giftDesc">{{ giftDesc }}</p>
      </ng-container>
    </div>

    <div class="ramadan-container ramadan-container--single" *ngIf="gifts.length > 0">
      <div class="ramadan-item large" *ngFor="let gift of gifts">
        <div class="img-wrapper main-banner">
          <img [src]="giftImageUrl(gift)" [alt]="gift | lang: 'nom' : currentLang" loading="lazy" decoding="async" width="3" height="2" />
          <div class="overlay-content">
            <a [routerLink]="['/details-gift', gift.id]" class="view-btn view-btn--link">{{ t.viewGift }}</a>
          </div>
        </div>
      </div>
    </div>

    <div class="ramadan-loading" *ngIf="isGiftsLoading">
      <p>{{ t.loading }}</p>
    </div>
  </section>
</ng-container>

<app-footer></app-footer>
