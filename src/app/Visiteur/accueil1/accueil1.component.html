<app-navbar></app-navbar>

<ng-container *ngIf="homeLabels$ | async as t">
  <section class="brand-story home-reveal">
    <h2>L'exigence du terroir Marocain</h2>
    <div class="story-content" [class.story-content--expanded]="brandStoryExpanded">
      <p class="story-content__text">{{ t.storyBody }}</p>
      <button type="button" class="story-content__toggle" (click)="toggleBrandStory()">
        <ng-container *ngIf="brandStoryExpanded">{{ t.readLess }}</ng-container>
        <ng-container *ngIf="!brandStoryExpanded">{{ t.readMore }}</ng-container>
      </button>
    </div>
  </section>

  <section class="video-preview">
    <div class="video-preview__frame">
      <video
        class="video-preview__player"
        controls
        playsinline
        preload="metadata"
        poster="https://res.cloudinary.com/dzajgsdwg/video/upload/so_0,f_auto,q_auto:eco,w_960/v1777480791/79AACBAE-8FDF-4FDA-8BE2-F00004C6FADD_1_fpk1ym.jpg"
        aria-label="Vidéo Myrass"
      >
        <source
          src="https://res.cloudinary.com/dzajgsdwg/video/upload/q_auto:best,vc_auto,w_1280,c_limit/v1777480791/79AACBAE-8FDF-4FDA-8BE2-F00004C6FADD_1_fpk1ym.mp4"
          type="video/mp4"
        />
        <track kind="captions" src="/assets/captions/myrass-video.fr.vtt" srclang="fr" label="Français" />
      </video>
      <div class="video-preview__overlay"></div>
    </div>
  </section>

  <section class="ramadan-section home-reveal home-reveal--delay-2">
    <div class="ramadan-header">
      <ng-container *ngIf="gifts.length > 0">
        <h3>{{ gifts[0] | lang: 'nom' : currentLang }}</h3>
        <div class="aid-desc" [class.aid-desc--expanded]="aidDescExpanded">
          <p *ngIf="(gifts[0] | lang: 'description' : currentLang) as giftDesc">{{ giftDesc }}</p>
        </div>
        <ng-container *ngIf="(gifts[0] | lang: 'description' : currentLang) as giftDesc2">
          <button
            type="button"
            class="aid-desc-toggle"
            (click)="toggleAidDesc()"
            *ngIf="giftDesc2.trim().length > 90"
          >
            {{ aidDescExpanded ? t.readLess : t.readMore }}
          </button>
        </ng-container>
      </ng-container>
    </div>

    <div class="ramadan-container ramadan-container--single" *ngIf="gifts.length > 0">
      <div class="ramadan-item large" *ngFor="let gift of gifts">
        <div class="img-wrapper main-banner" (click)="goToGiftDetail(gift)">
          <img
            [src]="giftImageUrl(gift)"
            [alt]="gift | lang: 'nom' : currentLang"
            loading="lazy"
            decoding="async"
            width="3"
            height="2"
          />
          <div class="overlay-content">
            <a [routerLink]="['/details-gift', gift.id]" class="view-btn view-btn--link">{{ t.viewGift }}</a>
          </div>
        </div>
      </div>
    </div>

    <div class="ramadan-loading" *ngIf="isGiftsLoading">
      <p>{{ t.loading }}</p>
    </div>
  </section>

  <section class="guide-container home-reveal home-reveal--delay-3">
    <div class="guide-hero">
      <div class="guide-content">
        <h2>{{ t.guideTitle }}</h2>
        <a routerLink="/guide" class="btn-guide">{{ t.readMore }}</a>
      </div>
    </div>

    <div class="features-bar">
      <div class="features-track">
        <div class="features-track__inner" aria-label="Myrass">
          <div class="feature" *ngFor="let _ of partnerFeaturesLoop">
            <img
              class="feature__logo"
              src="https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto,w_52/v1777552033/WhatsApp_Image_2026-04-30_at_13.24.49-removebg-preview_lsqmwc.png"
              alt="Logo Myrass"
              loading="lazy"
              decoding="async"
              width="26"
              height="26"
            />
            <span class="feature__text">Myrass</span>
          </div>
        </div>
        <div class="features-track__inner" aria-hidden="true">
          <div class="feature" *ngFor="let _ of partnerFeaturesLoop">
            <img
              class="feature__logo"
              src="https://res.cloudinary.com/dzajgsdwg/image/upload/f_auto,q_auto,w_56/v1777552033/WhatsApp_Image_2026-04-30_at_13.24.49-removebg-preview_lsqmwc.png"
              alt=""
              loading="lazy"
              decoding="async"
              width="28"
              height="28"
            />
            <span class="feature__text">Myrass</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="contact-dual home-reveal home-reveal--delay-3" id="contact">
    <div class="contact-dual__panel contact-dual__panel--partner">
      <h2 class="contact-dual__title">{{ t.partnerTitle }}</h2>
      <p class="contact-dual__desc">{{ t.partnerDesc }}</p>
      <form class="contact-dual__form" (ngSubmit)="submitPartnerEmailFromHome($event)">
        <div class="input-group">
          <input
            type="email"
            name="partner-email"
            autocomplete="email"
            [(ngModel)]="partnerHomeEmail"
            [placeholder]="t.newsletterPlaceholder"
            aria-label="Email partenariat"
          />
          <button type="submit" aria-label="Envoyer">
            <span class="arrow">→</span>
          </button>
        </div>
      </form>
    </div>
    <div class="contact-dual__panel contact-dual__panel--newsletter">
      <h2 class="contact-dual__title">{{ t.newsletterTitle }}</h2>
      <p class="contact-dual__desc">{{ t.newsletterDesc }}</p>
      <form class="contact-dual__form" (ngSubmit)="submitNewsletterEmailFromHome($event)">
        <div class="input-group">
          <input
            type="email"
            name="newsletter-email"
            autocomplete="email"
            [(ngModel)]="newsletterHomeEmail"
            [placeholder]="t.newsletterPlaceholder"
            aria-label="Newsletter email"
          />
          <button type="submit" aria-label="Envoyer">
            <span class="arrow">→</span>
          </button>
        </div>
      </form>
    </div>
  </section>
</ng-container>

<app-footer></app-footer>
