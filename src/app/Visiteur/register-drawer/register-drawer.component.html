<div class="reg-overlay" *ngIf="isOpen" (click)="close()"></div>

<div class="reg-drawer" [class.open]="isOpen" [attr.dir]="isRtl ? 'rtl' : 'ltr'">

  <button type="button" class="reg-drawer__close" (click)="close()" aria-label="Fermer">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>

  <div class="reg-drawer__body">

    <div class="reg-drawer__logo">
      <img src="/assets/logo.png" alt="Myrass" />
    </div>

    <div class="reg-stepper">
      <span class="reg-stepper__dot" [class.active]="step >= 1" [class.done]="step > 1"></span>
      <span class="reg-stepper__line"></span>
      <span class="reg-stepper__dot" [class.active]="step >= 2" [class.done]="step > 2"></span>
      <span class="reg-stepper__line"></span>
      <span class="reg-stepper__dot" [class.active]="step >= 3"></span>
    </div>

    <!-- STEP 1 -->
    <ng-container *ngIf="step === 1">
      <h2 class="reg-title">{{ l('step1Title') }}</h2>
      <p class="reg-subtitle">{{ l('chooseMeth') }}</p>

      <div class="reg-tabs">
        <button type="button" class="reg-tab" [class.active]="method === 'email'" (click)="setMethod('email')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
          </svg>
          {{ l('byEmail') }}
        </button>
        <button type="button" class="reg-tab" [class.active]="method === 'phone'" (click)="setMethod('phone')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.37 10.7a19.79 19.79 0 01-3.07-8.67A2 2 0 012.28 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.1 6.1l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          {{ l('byPhone') }}
        </button>
      </div>

      <div class="reg-field-wrap">
        <label class="reg-label">{{ method === 'email' ? l('byEmail') : l('byPhone') }}</label>
        <input *ngIf="method === 'email'" type="email" class="reg-input"
          [placeholder]="l('emailPh')" [(ngModel)]="emailValue"
          autocomplete="email" (keyup.enter)="sendCode()" />
        <input *ngIf="method === 'phone'" type="tel" class="reg-input"
          [placeholder]="l('phonePh')" [(ngModel)]="phoneValue"
          autocomplete="tel" (keyup.enter)="sendCode()" />
        <p class="reg-error" *ngIf="step1Error">{{ step1Error }}</p>
      </div>

      <button type="button" class="reg-btn" [disabled]="sendingCode" (click)="sendCode()">
        {{ sendingCode ? l('sending') : l('sendCode') }}
      </button>
    </ng-container>

    <!-- STEP 2 : OTP -->
    <ng-container *ngIf="step === 2">
      <h2 class="reg-title">{{ l('step2Title') }}</h2>
      <p class="reg-subtitle">{{ l('step2Hint') }} <strong>{{ inputValue }}</strong></p>

      <div class="reg-otp-timer">
        <svg class="reg-otp-timer__ring" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="#f0ece8" stroke-width="3"/>
          <circle cx="28" cy="28" r="24" fill="none" stroke="#553b31" stroke-width="3"
            stroke-linecap="round" stroke-dasharray="150.8"
            [style.stroke-dashoffset]="150.8 * (1 - otpSecondsLeft / OTP_TTL)"
            transform="rotate(-90 28 28)"/>
        </svg>
        <span class="reg-otp-timer__text">{{ otpMinSec }}</span>
      </div>

      <div class="reg-field-wrap">
        <label class="reg-label">{{ l('otpLabel') }}</label>
        <input type="text" class="reg-input reg-input--otp"
          placeholder="000000" [(ngModel)]="otpCode"
          maxlength="8" inputmode="numeric" autocomplete="one-time-code"
          (keyup.enter)="verifyOtp()" />
        <p class="reg-error" *ngIf="otpError">{{ otpError }}</p>
      </div>

      <button type="button" class="reg-btn" [disabled]="otpVerifying" (click)="verifyOtp()">
        {{ otpVerifying ? l('sending') : l('verify') }}
      </button>

      <button type="button" class="reg-link" [disabled]="resendCooldown > 0" (click)="resendCode()">
        {{ l('resend') }}{{ resendCooldown > 0 ? ' (' + resendCooldown + 's)' : '' }}
      </button>

      <button type="button" class="reg-back" (click)="step = 1">← Retour</button>
    </ng-container>

    <!-- STEP 3 : Mot de passe -->
    <ng-container *ngIf="step === 3">
      <h2 class="reg-title">{{ l('step3Title') }}</h2>

      <div class="reg-field-wrap">
        <label class="reg-label">{{ l('pwLabel') }}</label>
        <div class="reg-pass-wrap">
          <input [type]="showPw ? 'text' : 'password'" class="reg-input"
            [(ngModel)]="password" autocomplete="new-password" />
          <button type="button" class="reg-eye" (click)="showPw = !showPw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <ul class="reg-conditions">
          <li *ngFor="let c of pwConditions" [class.ok]="c.ok">
            <span class="reg-conditions__icon">{{ c.ok ? '✓' : '○' }}</span> {{ c.label }}
          </li>
        </ul>
      </div>

      <div class="reg-field-wrap">
        <label class="reg-label">{{ l('confirmLabel') }}</label>
        <div class="reg-pass-wrap">
          <input [type]="showConfirm ? 'text' : 'password'" class="reg-input"
            [(ngModel)]="confirm" autocomplete="new-password" />
          <button type="button" class="reg-eye" (click)="showConfirm = !showConfirm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <p class="reg-match" *ngIf="confirm && password === confirm && password.length > 0">{{ l('confirmMatch') }}</p>
      </div>

      <p class="reg-error" *ngIf="step3Error">{{ step3Error }}</p>

      <button type="button" class="reg-btn" [disabled]="submitting || !pwValid" (click)="register()">
        {{ submitting ? l('creating') : l('createAccount') }}
      </button>
    </ng-container>

  </div>
</div>
