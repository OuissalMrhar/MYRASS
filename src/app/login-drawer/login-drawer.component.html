<div class="drawer-overlay" *ngIf="isOpen" (click)="close()"></div>

<div class="login-drawer" [class.open]="isOpen">
  <div class="drawer-header">
    <h2 class="title">Login</h2>
    <button class="close-icon" (click)="close()">✕</button>
  </div>

  <div class="drawer-body">
    <div class="google-section">
      <button class="btn-google">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
        Se connecter avec Google
      </button>
      <span class="or-text">ou utilisez vos identifiants</span>
    </div>

    <div class="form-container">
      <div class="form-group">
        <label>E-mail*</label>
        <input type="email" class="custom-input">
      </div>

      <div class="form-group">
        <label>Mot de passe*</label>
        <div class="password-container">
          <input [type]="showPassword ? 'text' : 'password'" class="custom-input">
      <span class="toggle-password" (click)="togglePassword()">
  <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
    <circle cx="12" cy="12" r="3"></circle>
  </svg>

  <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
    <line x1="1" y1="1" x2="23" y2="23"></line>
  </svg>
</span>
        </div>
        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
      </div>

      <button class="btn-black">M'identifier</button>
    </div>

    <div class="section-divider">
      <div class="new-client-box">
        <h3>Nouveau Client</h3>
        <p>Créez votre espace Myrass pour une expérience personnalisée.</p>
        <button class="btn-outline" (click)="onSwitch()">Créer mon compte</button>
      </div>
    </div>
  </div>
</div>
